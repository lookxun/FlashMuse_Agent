name: flashmuse
services:
  flashmuse-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: flashmuse
      POSTGRES_PASSWORD: "qky9brw3fp5cojhdv80lamtn7ug1"
      POSTGRES_DB: flashmuse
    volumes:
      - /opt/flashmuse/data/pgdata:/var/lib/postgresql/data
    networks: [flashmuse]

  flashmuse-app:
    build:
      context: ./app
      args:
        NEXT_PUBLIC_WORKFLOW_MODE_ENABLED: "true"
    restart: unless-stopped
    depends_on: [flashmuse-db]
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: "postgresql://flashmuse:qky9brw3fp5cojhdv80lamtn7ug1@flashmuse-db:5432/flashmuse?schema=public"
    volumes:
      - /opt/flashmuse/data/.env.local:/app/.env.local
      - /opt/flashmuse/data/generated:/app/public/generated
      - /opt/flashmuse/data/runtime:/app/.runtime
      - /opt/flashmuse/data/home-assets:/app/public/home-assets
    expose:
      - "3000"
    networks: [flashmuse]

  # nginx 是"完整独立项目"不可缺的一层：Next `next start` 只服务构建时已存在的 public 文件，
  # 而 public/generated 被 .dockerignore 排除 → Next 对 /generated/* 一律 404。
  # 马来/阿里一直由各自 nginx 服务 /generated、不经 Next；迁到腾讯纯 Docker 栈必须补这层。
  flashmuse-nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on: [flashmuse-app]
    volumes:
      - /opt/flashmuse/data/nginx/flashmuse.conf:/etc/nginx/conf.d/default.conf:ro
      - /opt/flashmuse/data/generated:/srv/generated:ro
      - /opt/flashmuse/data/home-assets:/srv/home-assets:ro
    ports:
      - "5000:80"
    networks: [flashmuse]

networks:
  flashmuse:
    name: flashmuse_default
