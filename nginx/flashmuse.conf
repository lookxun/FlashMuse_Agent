# FlashMuse nginx (Tencent Singapore Docker stack).
# Deployed to: /opt/flashmuse/data/nginx/flashmuse.conf  (bind-mounted into flashmuse-nginx as /etc/nginx/conf.d/default.conf)
#
# WHY this exists: Next.js `next start` only serves public/ files that existed at BUILD time.
# public/generated is excluded by .dockerignore, so Next returns 404 for /generated/*.
# On Malaysia/Ali, /generated was always served by that host's own nginx (never Next).
# On the Tencent pure-Docker stack there is no host nginx, so this container serves /generated + /home-assets
# from disk and reverse-proxies everything else to the app. Mirrors the Malaysia architecture.
server {
    listen 80;
    server_name _;

    client_max_body_size 1024m;
    client_body_timeout 300s;

    # 生成媒体：由 nginx 直接服务磁盘文件（对齐马来架构，Next 不服务 /generated）
    location /generated/ {
        alias /srv/generated/;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location /home-assets/ {
        alias /srv/home-assets/;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location / {
        proxy_pass http://flashmuse-app:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_request_buffering off;
    }
}
